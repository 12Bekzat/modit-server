spring.application.name=magazine-server

server.port=${PORT:8081}

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.forward-headers-strategy=framework

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.issuer=${APP_JWT_ISSUER:magazine-server}
app.jwt.access-token-ttl=${APP_JWT_ACCESS_TOKEN_TTL:PT12H}

app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.admin.full-name=${APP_ADMIN_FULL_NAME}
app.admin.phone=${APP_ADMIN_PHONE}
